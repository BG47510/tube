name: Extract Dailymotion m3u8 (yt-dlp version)

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Dailymotion video ID'
        required: true
        default: 'xkxbzc'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Extract M3U8 Link
        id: extract_step
        run: |
          # On tente d'extraire l'URL du flux direct (-g pour get-url)
          # On utilise un User-Agent de navigateur moderne pour éviter le blocage
          URL=$(yt-dlp --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 -g "https://www.dailymotion.com/video/${{ github.event.inputs.video_id }}" || echo "ERREUR")
          
          if [ "$URL" = "ERREUR" ]; then
            echo "Impossible d'extraire le lien. La vidéo est peut-être privée ou géo-bloquée."
            exit 1
          fi

          echo "M3U8_URL=$URL" >> $GITHUB_ENV
          echo "Lien trouvé : $URL"

      - name: Save result to file
        run: |
          echo "${{ env.M3U8_URL }}" > m3u8_link.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dailymotion-link
          path: m3u8_link.txt
